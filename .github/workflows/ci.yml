on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run YANA tests (bash)
        shell: bash
        run: ./yana_tests.sh
      - name: Run YANA tests (pwsh)
        shell: pwsh
        run: ./yana_tests.ps1
